---
openapi: 3.0.3
info:
  title: Salary Management API
  version: v1
  description: OpenAPI documentation for HR salary management workflows.
servers:
- url: http://localhost:3000
  description: Local development
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Paste the JWT returned by POST /api/v1/auth/sign_in. Swagger UI
        persists it and sends it on protected requests.
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
          example: Only HR users can access this resource
    ValidationErrors:
      type: object
      properties:
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          example:
            salary:
            - must be greater than 0
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        first_name:
          type: string
          nullable: true
          maxLength: 50
          example: Priya
        last_name:
          type: string
          nullable: true
          maxLength: 50
          example: Rao
        email:
          type: string
          format: email
          maxLength: 50
          example: hr@example.com
        role:
          type: string
          enum:
          - hr
          - employee
          example: hr
        last_sign_in_at:
          type: string
          format: date-time
          nullable: true
    SignInRequest:
      type: object
      required:
      - email
      - password
      properties:
        email:
          type: string
          format: email
          maxLength: 50
          example: hr@example.com
        password:
          type: string
          format: password
          example: password123
    SignInResponse:
      type: object
      properties:
        user:
          "$ref": "#/components/schemas/User"
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiJ9...
    Lookup:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Engineering
    Employee:
      type: object
      properties:
        id:
          type: integer
          example: 1
        user_id:
          type: integer
          example: 12
        first_name:
          type: string
          nullable: true
          maxLength: 50
          example: Priya
        last_name:
          type: string
          nullable: true
          maxLength: 50
          example: Rao
        full_name:
          type: string
          example: Priya Rao
        email:
          type: string
          format: email
          nullable: true
          maxLength: 50
          example: priya.rao@example.com
        department:
          "$ref": "#/components/schemas/Lookup"
        job_title:
          "$ref": "#/components/schemas/Lookup"
        country:
          "$ref": "#/components/schemas/Lookup"
        salary:
          type: string
          example: '120000.0'
        joining_date:
          type: string
          format: date
          example: '2026-05-08'
        status:
          type: string
          enum:
          - onboarding
          - active
          - inactive
          example: active
        active:
          type: boolean
          example: true
        deleted_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    EmployeeRequest:
      type: object
      required:
      - first_name
      - last_name
      - email
      - department_id
      - job_title_id
      - country_id
      - salary
      - joining_date
      properties:
        first_name:
          type: string
          maxLength: 50
          example: Priya
        last_name:
          type: string
          maxLength: 50
          example: Rao
        email:
          type: string
          format: email
          maxLength: 50
          example: priya.rao@example.com
        department_id:
          type: integer
          example: 1
        job_title_id:
          type: integer
          example: 1
        country_id:
          type: integer
          example: 1
        salary:
          type: string
          example: '120000.00'
        joining_date:
          type: string
          format: date
          example: '2026-05-08'
        status:
          type: string
          enum:
          - onboarding
          - active
          - inactive
          example: active
        active:
          type: boolean
          example: true
    EmployeeUpdateRequest:
      type: object
      required:
      - first_name
      - last_name
      - email
      - department_id
      - job_title_id
      - salary
      - joining_date
      - status
      properties:
        first_name:
          type: string
          maxLength: 50
          example: Priya
        last_name:
          type: string
          maxLength: 50
          example: Rao
        email:
          type: string
          format: email
          maxLength: 50
          example: priya.rao@example.com
        department_id:
          type: integer
          example: 1
        job_title_id:
          type: integer
          example: 1
        salary:
          type: string
          example: '120000.00'
        joining_date:
          type: string
          format: date
          example: '2026-05-08'
        status:
          type: string
          enum:
          - onboarding
          - active
          - inactive
          example: active
    EmployeesIndex:
      type: object
      properties:
        data:
          type: array
          items:
            "$ref": "#/components/schemas/Employee"
        meta:
          type: object
          properties:
            page:
              type: integer
              example: 1
            per_page:
              type: integer
              example: 20
            total_count:
              type: integer
              example: 1
            total_pages:
              type: integer
              example: 1
    InsightCollection:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            additionalProperties: true
          example:
          - country: India
            min_salary: '40000.0'
            max_salary: '150000.0'
            avg_salary: '90000.0'
            employee_count: 3
    PayrollSummary:
      type: object
      properties:
        data:
          type: object
          properties:
            total_payroll:
              type: string
              example: '520000.0'
            total_employees:
              type: integer
              example: 4
            average_salary:
              type: string
              example: '130000.0'
            highest_salary:
              type: string
              example: '250000.0'
            lowest_salary:
              type: string
              example: '40000.0'
paths:
  "/api/v1/auth/sign_in":
    post:
      summary: Sign in as an HR user
      tags:
      - Authentication
      parameters: []
      responses:
        '200':
          description: signed in
          headers:
            Authorization:
              schema:
                type: string
              description: Bearer JWT for protected requests
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/SignInResponse"
        '401':
          description: invalid credentials
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '403':
          description: employee users cannot sign in
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/SignInRequest"
  "/api/v1/auth/sign_out":
    delete:
      summary: Sign out the current user
      tags:
      - Authentication
      security:
      - bearerAuth: []
      responses:
        '200':
          description: signed out
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Signed out successfully
        '401':
          description: not authenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
  "/api/v1/employees":
    get:
      summary: List employees
      tags:
      - Employees
      security:
      - bearerAuth: []
      parameters:
      - name: page
        in: query
        required: false
        example: 1
        schema:
          type: integer
      - name: per_page
        in: query
        required: false
        example: 20
        description: Clamped from 1 to 100
        schema:
          type: integer
      - name: id
        in: query
        required: false
        schema:
          type: integer
      - name: name
        in: query
        required: false
        schema:
          type: string
      - name: joining_date
        in: query
        format: date
        required: false
        schema:
          type: string
      - name: job_title_id
        in: query
        required: false
        schema:
          type: integer
      - name: department_id
        in: query
        required: false
        schema:
          type: integer
      - name: country_id
        in: query
        required: false
        schema:
          type: integer
      - name: status
        in: query
        schema:
          type: string
          enum:
          - onboarding
          - active
          - inactive
        required: false
      - name: salary_range
        in: query
        schema:
          type: string
          enum:
          - 0-50000
          - 50001-100000
          - 100001-200000
          - 200000+
        required: false
      responses:
        '200':
          description: employees returned
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/EmployeesIndex"
        '401':
          description: not authenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
    post:
      summary: Create an employee
      tags:
      - Employees
      security:
      - bearerAuth: []
      parameters: []
      responses:
        '201':
          description: employee created
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Employee"
        '422':
          description: validation failed
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ValidationErrors"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - employee
              properties:
                employee:
                  "$ref": "#/components/schemas/EmployeeRequest"
  "/api/v1/employees/{id}":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    get:
      summary: Show an employee
      tags:
      - Employees
      security:
      - bearerAuth: []
      responses:
        '200':
          description: employee returned
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Employee"
        '404':
          description: employee not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
    patch:
      summary: Update an employee
      tags:
      - Employees
      security:
      - bearerAuth: []
      parameters: []
      responses:
        '200':
          description: employee updated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Employee"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - employee
              properties:
                employee:
                  "$ref": "#/components/schemas/EmployeeUpdateRequest"
    delete:
      summary: Soft delete an employee
      tags:
      - Employees
      security:
      - bearerAuth: []
      responses:
        '204':
          description: employee deleted
  "/api/v1/insights/country_salaries":
    get:
      summary: Salary aggregates by country
      tags:
      - Insights
      security:
      - bearerAuth: []
      responses:
        '200':
          description: insight returned
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/InsightCollection"
        '401':
          description: not authenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
  "/api/v1/insights/country_salary_stats":
    get:
      summary: Salary stats by country
      tags:
      - Insights
      security:
      - bearerAuth: []
      responses:
        '200':
          description: insight returned
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/InsightCollection"
        '401':
          description: not authenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
  "/api/v1/insights/department_average":
    get:
      summary: Average salary by department
      tags:
      - Insights
      security:
      - bearerAuth: []
      responses:
        '200':
          description: insight returned
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/InsightCollection"
        '401':
          description: not authenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
  "/api/v1/insights/job_title_average":
    get:
      summary: Average salary by country and job title
      tags:
      - Insights
      security:
      - bearerAuth: []
      responses:
        '200':
          description: insight returned
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/InsightCollection"
        '401':
          description: not authenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
  "/api/v1/insights/payroll_summary":
    get:
      summary: Overall payroll KPIs
      tags:
      - Insights
      security:
      - bearerAuth: []
      responses:
        '200':
          description: insight returned
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/PayrollSummary"
        '401':
          description: not authenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
  "/api/v1/insights/salary_distribution":
    get:
      summary: Salary distribution buckets
      tags:
      - Insights
      security:
      - bearerAuth: []
      responses:
        '200':
          description: insight returned
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/InsightCollection"
        '401':
          description: not authenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
  "/api/v1/insights/job_title_salary_stats":
    get:
      summary: Salary stats by job title for a country
      tags:
      - Insights
      security:
      - bearerAuth: []
      parameters:
      - name: country_id
        in: query
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: insight returned
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/InsightCollection"
        '400':
          description: country_id is required
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
